<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  
  <!-- CSS -->
<link rel="stylesheet" href="{{ '/styles/main.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/styles/sidebar.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/styles/right-sidebar.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/styles/cards.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/styles/markdown.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/styles/responsive.css' | relative_url }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  
  {% seo %}
</head>
<body>
  <div class="layout">
    {% include sidebar.html %}
    
    <main class="content">
      {{ content }}
    </main>
    
    {% include right-sidebar.html %}
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</body>
</html>
